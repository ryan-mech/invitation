<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
<source src="Music/the_mountain-happy-birthday-508020.mp3">
</audio>

<!-- APOLOGY -->
<section class="scene active" id="apology">
  <div class="card">
    <h1>Hey ❤️</h1>
    <p>I’m really sorry. I just want to make things right.</p>

    <button id="yes">I Forgive You ❤️</button>
    <button id="no">Not Yet</button>
  </div>
</section>

<!-- INTRO -->
<section class="scene" id="intro">
  <div class="card">
    <h1>Happy Birthday ❤️</h1>
    <p>A small journey of memories…</p>
    <button id="start">Begin ✨</button>
  </div>
</section>

<!-- REASONS -->
<section class="scene" id="reasons">
  <div class="card">
    <h1>18 Reasons ❤️</h1>
    <div id="reasonBox"></div>
  </div>
</section>

<!-- MEMORY -->
<section class="scene" id="memory">
  <div class="card">
    <img id="memImg">
    <p id="memText"></p>
  </div>
</section>

<!-- LETTER -->
<section class="scene" id="letter">
  <div class="card">
    <h1>Letter ❤️</h1>
    <p id="letterText"></p>
  </div>
</section>

<!-- END -->
<section class="scene" id="end">
  <div class="card">
    <h1>Happy Birthday ❤️</h1>
    <button id="album">Open Album 📸</button>
  </div>
</section>

<!-- ALBUM -->
<section class="scene" id="album">
  <div class="card">
    <h1>Memory Album 📸</h1>
    <div id="grid"></div>
  </div>
</section>

<div id="viewer">
  <img id="viewerImg">
</div>

<script src="script.js"></script>
</body>
</html>
